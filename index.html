<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blob møder en ko</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff9f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            font-size: 5em;
        }
        #version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.8em;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>🐄</h1>
    <p id="version">v7</p>
    <audio controls autoplay>
        <source src="Ko.ogg" type="audio/ogg">
        <source src="Ko.m4a" type="audio/mp4">
        Your browser does not support the audio element.
    </audio> 
    <script>
        var lyd = document.getElementById("lyd");
        lyd.addEventListener("play", function() {
            lyd.muted = false;
        });

        // Fallback: Afspil ved første interaktion
        document.addEventListener("touchstart", function() {
            lyd.play();
        }, { once: true });
        document.addEventListener("click", function() {
            lyd.play();
        }, { once: true });
    </script>
</body>
</html>
