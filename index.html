<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blob møder en ko</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff9f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            font-size: 5em;
        }
    </style>
</head>
<body>
    <h1>🐄</h1>
    <audio id="lyd">
        <source src="Ko.m4a" type="audio/mp4">
    </audio>
    <script>
        var lyd = document.getElementById("lyd");
        
        // Prøv at afspille automatisk når siden loader
        window.addEventListener("load", function() {
            lyd.play().catch(() => {
                // Hvis det fejler, afspil ved første touch
                document.addEventListener("touchstart", function() {
                    lyd.play();
                }, { once: true });
            });
        });
    </script>
</body>
</html>
